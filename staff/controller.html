<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ターンオーバー操作パネル</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  button { padding: 8px 16px; margin: 5px; }
  input { padding: 6px; margin: 5px; }
</style>
</head>
<body>

<h2>操作パネル</h2>

<label>停止番号リスト:
  <input type="text" id="stopList" value="3,2,1">
</label>
<button onclick="generateButtons()">▶ ボタン生成</button>

<div id="buttons"></div>

<hr>

<input type="number" id="manualInput" min="1" max="22" placeholder="番号入力">
<button onclick="manualScroll()">移動</button>

<script>
let mainWindow = null;

// メイン画面を開く
function openMain() {
  mainWindow = window.open("to_main.html", "mainWindow");
}

// メイン画面へ送信
function send(type, value) {
  if (mainWindow) {
    mainWindow.postMessage({ type, value }, "*");
  }
}

function manualScroll() {
  const m = parseInt(document.getElementById("manualInput").value, 10);
  if (!isNaN(m)) send("scrollTo", m);
}

function generateButtons() {
  const input = document.getElementById("stopList").value;
  const numbers = input.split(",").map(n => parseInt(n.trim(), 10)).filter(n => !isNaN(n));
  const div = document.getElementById("buttons");
  div.innerHTML = "";

  numbers.forEach((m, idx) => {
    const btn = document.createElement("button");
    btn.textContent = `${idx+1}th`;
    btn.onclick = () => {
      send("scrollTo", m);
      send("setNumber", idx+1);
    };
    div.appendChild(btn);
  });
}

// 起動時に main.html を開く
openMain();
</script>

</body>
</html>
